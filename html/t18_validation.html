<!DOCTYPE html>
<html lang="en">

<head>
  <title>T18-validation</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T18-validation</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <p><br><br><i>Copy your HTML from the last task and keep building.</i><br><br><br><br></p>

  <button onclick="start()">Start</button><br>

  <form onsubmit="return false;">
    <label for="formName">Name:</label>
    <input type="text" id="nameField" name="formName" placeholder="Name..." required>
    <input type="submit" onClick=getUserName()>
  </form>

  <form onsubmit="return false;">
    <label for="formAge">Age:</label>
    <input type="text" id="ageField" name="formAge" placeholder="Age..." required>
    <input type="submit" onClick=getUserAge()>
  </form>

  <form onsubmit="return false;">
    <label for="formMoney">Pocket money:</label>
    <input type="text" id="moneyField" name="formMoney" placeholder="$..." required>
    <input type="submit" onClick=getUserMoney()>
  </form>
  <br><br>

  <button onclick="getList()">View list:</button><br>
  

  <form onsubmit="return false;">
    <label for="formItem">Add an item to your shopping list:</label>
    <input type="text" id="itemField" name="formItem" placeholder="Item...">
    <input type="submit" value="Add Item" onClick=getItem()>
  </form>

  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>


  <script src="../t18_validation.js"></script>

</body>

</html>
<!--*************************************************************
  END OF T18_VALIDATION.HTML
**************************************************************-->
